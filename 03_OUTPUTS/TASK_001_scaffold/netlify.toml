[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ============================================================
# SCHEDULED FUNCTIONS (CRON JOBS)
# All times Eastern — ingestion runs in sequence, alerts after
# ============================================================

# Federal contracts — SAM.gov (TASK_002)
# 11:00 UTC = 06:00 ET (EST, UTC-5) — adjusts to 07:00 EDT in summer
[functions."ingest-federal"]
  schedule = "0 11 * * *"

# State + local contracts — PA eMarketplace, PA Treasury,
# Allegheny County, City of Pittsburgh, URA (TASK_003)
# 12:00 UTC = 07:00 ET (EST, UTC-5) — adjusts to 08:00 EDT in summer
[functions."ingest-state-local"]
  schedule = "0 12 * * *"

# Educational institution contracts —
# Pitt, CMU, CCAC, PGH Schools, Duquesne (TASK_011)
[functions."ingest-education"]
  schedule = "30 7 * * *"

# Grants — Grants.gov, PA DCED, URA, SBA (TASK_012)
[functions."ingest-grants"]
  schedule = "45 7 * * *"

# Events + meetings — City Council, Planning, URA,
# Allegheny County, Eventbrite, PGH Business Collective (TASK_013)
[functions."ingest-events"]
  schedule = "0 8 * * *"

# Forecast opportunities — SAM.gov forecasts (TASK_018)
[functions."ingest-forecasts"]
  schedule = "30 6 * * *"

# Alert emails — runs after all ingestion is complete (TASK_006)
[functions."run-alerts"]
  schedule = "0 9 * * *"

# Subcontractor directory refresh — SAM.gov Entity API,
# SBA DSBS, PHFA MWBE, Allegheny MWDBE (TASK_014)
# Weekly — entity data is stable
[functions."ingest-subcontractors"]
  schedule = "0 2 * * 0"

# Incumbent contract data — USASpending FPDS (TASK_018)
# Weekly — award data doesn't change daily
[functions."ingest-incumbents"]
  schedule = "0 3 * * 0"

# Community profiles — PA Dept of State seed data (TASK_016)
# Weekly
[functions."ingest-community"]
  schedule = "0 4 * * 0"

# ============================================================
# ENVIRONMENT (reference only — set real values in Netlify UI)
# ============================================================

[context.production.environment]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
